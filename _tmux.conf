set-option -g prefix C-q
unbind-key C-b
bind-key C-q send-prefix

bind r source-file ~/.tmux.conf \; display "Reloaded!"

set-option -sg escape-time 10
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g mouse on
set-option -g default-terminal "tmux-256color"
set-option -g default-shell "${SHELL}"
set-option -g default-command "${SHELL} -l"

set-window-option -g mode-keys vi
bind-key v copy-mode \; display "Copy mode!"
bind-key -T copy-mode-vi v     send-keys -X begin-selection
if-shell "is_linux" "bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel 'clip.exe'"
if-shell "is_linux" "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'clip.exe'"
if-shell "is_mac"   "bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "is_mac"   "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'"

bind-key S split-window
bind-key V split-window -h
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

bind-key -r C-w select-pane -t :.+
bind-key 1 select-pane -t :.1
bind-key 2 select-pane -t :.2
bind-key 3 select-pane -t :.3
bind-key 4 select-pane -t :.4
bind-key 5 select-pane -t :.5
bind-key 6 select-pane -t :.6
bind-key 7 select-pane -t :.7
bind-key 8 select-pane -t :.8
bind-key 9 select-pane -t :.9

bind-key a setw synchronize-panes \; display "synchronize-panes #{?pane_synchronized,on,off}"

# Style (Solarized Dark)
run "~/.dotfiles/tmux-style.sh"
